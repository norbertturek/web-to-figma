<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web to Figma</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { color: #8ab4f8; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 24px; }
    .card {
      background: #252540;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: #aaa;
      font-size: 14px;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #1a1a2e;
      color: #fff;
      font-size: 14px;
      margin-bottom: 12px;
    }
    textarea {
      height: 200px;
      font-family: monospace;
      font-size: 12px;
      resize: vertical;
    }
    input:focus, select:focus, textarea:focus {
      outline: 2px solid #8ab4f8;
      border-color: transparent;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #8ab4f8;
      color: #1a1a2e;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    button:hover { background: #aac8ff; }
    button:disabled { background: #555; cursor: not-allowed; }
    .btn-secondary {
      background: #3a3a5a;
      color: #fff;
    }
    .btn-secondary:hover { background: #4a4a6a; }
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .status.info { background: #1a2a4a; color: #8ab4f8; }
    .status.success { background: #1a3a2a; color: #81c995; }
    .status.error { background: #3a1a1a; color: #f28b82; }
    .instructions {
      background: #1a2a3a;
      border-radius: 8px;
      padding: 16px;
      margin-top: 24px;
    }
    .instructions h3 { margin-top: 0; color: #8ab4f8; }
    .instructions ol { margin: 0; padding-left: 20px; }
    .instructions li { margin-bottom: 8px; }
    code {
      background: #333;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    .stats {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .stat {
      background: #1a1a2e;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
    }
    .stat strong { color: #8ab4f8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Web to Figma</h1>
    <p class="subtitle">Puppeteer capture → Figma plugin import</p>
    
    <div class="card">
      <label for="url">URL strony</label>
      <input type="url" id="url" placeholder="https://example.com">
      
      <label for="width">Viewport</label>
      <select id="width">
        <option value="1920">1920px (Desktop XL)</option>
        <option value="1440" selected>1440px (Desktop)</option>
        <option value="1280">1280px (Laptop)</option>
        <option value="1024">1024px (Tablet landscape)</option>
        <option value="768">768px (Tablet)</option>
        <option value="430">430px (Mobile L)</option>
        <option value="375">375px (Mobile M)</option>
      </select>
      
      <label>
        <input type="checkbox" id="scroll" checked style="width: auto; margin-right: 8px;">
        Przewiń stronę (lazy content)
      </label>
      
      <button id="captureBtn">Capture</button>
      
      <div id="status" class="status" style="display: none;"></div>
      <div id="stats" class="stats" style="display: none;"></div>
    </div>
    
    <div class="card">
      <label for="json">Figma JSON (kopiuj do pluginu)</label>
      <textarea id="json" readonly placeholder="JSON pojawi się tutaj po capture..."></textarea>
      <button id="copyBtn" class="btn-secondary">Kopiuj JSON</button>
    </div>
    
    <div class="instructions">
      <h3>Jak używać?</h3>
      <ol>
        <li>Wpisz URL i kliknij <strong>Capture</strong></li>
        <li>Kliknij <strong>Kopiuj JSON</strong></li>
        <li>W Figmie: <code>Plugins → Web to Figma Import</code></li>
        <li>Wklej JSON i kliknij <strong>Import</strong></li>
      </ol>
    </div>
  </div>
  
  <script>
    const urlInput = document.getElementById('url');
    const widthSelect = document.getElementById('width');
    const scrollCheck = document.getElementById('scroll');
    const captureBtn = document.getElementById('captureBtn');
    const statusEl = document.getElementById('status');
    const statsEl = document.getElementById('stats');
    const jsonArea = document.getElementById('json');
    const copyBtn = document.getElementById('copyBtn');
    
    function setStatus(msg, type = 'info') {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + type;
      statusEl.style.display = 'block';
    }
    
    function showStats(stats, viewport) {
      statsEl.innerHTML = `
        <div class="stat"><strong>${stats.frames}</strong> frames</div>
        <div class="stat"><strong>${stats.texts}</strong> texts</div>
        <div class="stat"><strong>${stats.svgs}</strong> SVGs</div>
        <div class="stat"><strong>${stats.images}</strong> images</div>
        <div class="stat"><strong>${viewport.width}×${viewport.height}</strong> px</div>
      `;
      statsEl.style.display = 'flex';
    }
    
    captureBtn.addEventListener('click', async () => {
      const url = urlInput.value.trim();
      if (!url) {
        setStatus('Podaj URL strony', 'error');
        return;
      }
      
      captureBtn.disabled = true;
      setStatus('Ładowanie strony w Puppeteer...', 'info');
      statsEl.style.display = 'none';
      jsonArea.value = '';
      
      try {
        const response = await fetch('/capture', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url,
            width: parseInt(widthSelect.value),
            scroll: scrollCheck.checked
          })
        });
        
        const data = await response.json();
        
        if (!data.success) {
          throw new Error(data.error || 'Błąd capture');
        }
        
        const json = JSON.stringify(data.figmaTree, null, 2);
        jsonArea.value = json;
        
        showStats(data.stats, data.viewport);
        setStatus('✓ Capture gotowy! Skopiuj JSON i wklej do pluginu Figma.', 'success');
        
      } catch (err) {
        setStatus('Błąd: ' + err.message, 'error');
      } finally {
        captureBtn.disabled = false;
      }
    });
    
    copyBtn.addEventListener('click', async () => {
      const json = jsonArea.value;
      if (!json) {
        setStatus('Najpierw zrób capture', 'error');
        return;
      }
      
      try {
        await navigator.clipboard.writeText(json);
        setStatus('✓ JSON skopiowany!\n\nTeraz w Figmie:\nPlugins → Web to Figma Import → Wklej → Import', 'success');
      } catch (err) {
        setStatus('Błąd kopiowania: ' + err.message, 'error');
      }
    });
  </script>
</body>
</html>
